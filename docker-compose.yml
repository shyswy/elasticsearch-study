version: "3.8"

services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.17.0
    container_name: es-study
    environment:
      - node.name=node-1
      - cluster.name=es-study-cluster
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.enrollment.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9201:9200"
      - "9301:9300"
    volumes:
      - es-study-data:/usr/share/elasticsearch/data
    networks:
      - es-study-net

volumes:
  es-study-data:
    driver: local

networks:
  es-study-net:
    driver: bridge
